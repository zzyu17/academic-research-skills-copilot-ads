    comparison: "<"
    threshold_value: 0.30
  fpr:
    comparison: "<"
    threshold_value: 0.20
  balanced_accuracy:
    comparison: ">="
    threshold_value: 0.75
tuple_distribution:
  - label: wording_cliche
    n: 20
  - label: domain_native
    n: 20
